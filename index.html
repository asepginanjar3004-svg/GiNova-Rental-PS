<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="GiNova Rental PS Management System - Sistem manajemen rental PlayStation premium dengan billing real-time, F&B, laporan keuangan, dan pembayaran QRIS.">
  <meta name="theme-color" content="#146c43">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GiNova PS">
  <meta name="msapplication-TileColor" content="#146c43">
  <title>Login | GiNova Rental PS</title>
  <link rel="manifest" href="manifest.json">
  <link rel="icon" type="image/svg+xml" href="img/ginova-logo.svg">
  <link rel="apple-touch-icon" href="img/ginova-logo.svg">
  <link rel="preconnect" href="https://cdn.jsdelivr.net">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="login-container">
    <div class="login-card fade-in">
      <div class="text-center mb-3">
        <img src="img/ginova-logo.svg" alt="GiNova" class="login-logo-img">
      </div>
      <h3 class="text-center fw-bold mb-1">GiNova</h3>
      <p class="text-muted text-center mb-4">Rental PS Management System</p>
      
      <form id="loginForm">
        <div class="mb-3">
          <label class="form-label fw-semibold">Username</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-person text-muted"></i>
            </span>
            <input type="text" class="form-control form-control-gn border-start-0" id="username" placeholder="Masukkan username" required>
          </div>
        </div>
        
        <div class="mb-4">
          <label class="form-label fw-semibold">Password</label>
          <div class="input-group">
            <span class="input-group-text bg-light border-end-0">
              <i class="bi bi-lock text-muted"></i>
            </span>
            <input type="password" class="form-control form-control-gn border-start-0" id="password" placeholder="Masukkan password" required>
            <button class="btn btn-outline-secondary border-start-0" type="button" id="togglePassword">
              <i class="bi bi-eye"></i>
            </button>
          </div>
        </div>
        
        <button type="submit" class="btn btn-gn-primary w-100 py-2 mb-3">
          <i class="bi bi-box-arrow-in-right me-2"></i>Masuk
        </button>
        
        <div class="alert alert-danger d-none" id="loginError">
          <i class="bi bi-exclamation-triangle-fill me-2"></i>
          <span id="errorMessage"></span>
        </div>
      </form>
      
      <hr class="my-4">
      
      <div class="text-center">
        <small class="text-muted">
          <i class="bi bi-shield-lock me-1"></i>
          Sistem Manajemen Rental PS Premium
        </small>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/app.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // Toggle password visibility
    document.getElementById('togglePassword').addEventListener('click', function() {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.replace('bi-eye', 'bi-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.replace('bi-eye-slash', 'bi-eye');
      }
    });
    
    // Handle login
    document.getElementById('loginForm').addEventListener('submit', function(e) {
      e.preventDefault();
      
      const username = document.getElementById('username').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('loginError');
      const errorMessage = document.getElementById('errorMessage');
      
      const result = Auth.login(username, password);
      
      if (result.success) {
        errorDiv.classList.add('d-none');
      if (result.user.role === 'admin') {
          window.location.replace('admin.html');
        } else {
          window.location.replace('dashboard.html');
        }
      } else {
        errorMessage.textContent = result.message;
        errorDiv.classList.remove('d-none');
      }
    });
    
    // Redirect if already logged in
    if (Auth.isLoggedIn()) {
      const user = Auth.getCurrentUser();
      if (user.role === 'admin') {
        window.location.replace('admin.html');
      } else {
        window.location.replace('dashboard.html');
      }
    }
  </script>
</body>
</html>
